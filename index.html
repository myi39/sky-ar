<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>sky-ar</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: ./images/image_andi.mind"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="model" src="./3d/3d_andi.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="1 2 1" intensity="1"></a-light>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        id="card-model"
        src="#model"
        position="0 0 0"
        scale="25 25 25"
        rotation="0 180 0"
      ></a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    document.querySelector('#card-model').addEventListener('model-loaded', function () {
      const el = this;
      requestAnimationFrame(function () {
        const box = new THREE.Box3().setFromObject(el.object3D);
        // カードの底辺を検出画像面(z=0)に合わせる
        if (box.min.z < 0) {
          el.object3D.position.z -= box.min.z;
        }
      });
    });
  </script>
</body>
</html>
