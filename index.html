<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>sky-ar</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: ./images/image_andi.mind"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="model" src="./3d/3d_andi.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="1 2 1" intensity="1"></a-light>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        id="card-model"
        src="#model"
        position="0 0 0"
        scale="25 25 25"
        rotation="180 0 0"
      ></a-gltf-model>
    </a-entity>
  </a-scene>

  <div id="debug" style="position:fixed;top:0;left:0;background:rgba(0,0,0,0.75);color:#0f0;font-family:monospace;font-size:13px;padding:8px;z-index:9999;pointer-events:none"></div>

  <script>
    function dbg(msg) {
      document.getElementById('debug').innerHTML += msg + '<br>';
      console.log(msg);
    }

    document.querySelector('#card-model').addEventListener('model-loaded', function () {
      dbg('model-loaded');
      const el = this;
      requestAnimationFrame(function () {
        const obj = el.object3D;
        const box = new THREE.Box3();

        // MindARの親エンティティがmatrixWorldをNaNにするため、
        // setFromObject（ワールド行列使用）は使えない。
        // obj自身のローカル行列だけを使って計算する。
        obj.traverse(function(node) {
          if (!node.isMesh || !node.geometry) return;
          node.geometry.computeBoundingBox();
          if (!node.geometry.boundingBox) return;

          const mat = new THREE.Matrix4();
          let cur = node;
          while (cur) {
            cur.updateMatrix();
            mat.premultiply(cur.matrix);
            if (cur === obj) break;
            cur = cur.parent;
          }

          box.union(node.geometry.boundingBox.clone().applyMatrix4(mat));
        });

        dbg('min.z=' + box.min.z.toFixed(3));
        dbg('max.z=' + box.max.z.toFixed(3));

        if (isFinite(box.min.z)) {
          el.setAttribute('position', { x: 0, y: 0, z: -box.min.z });
          dbg('z offset=' + (-box.min.z).toFixed(3));
        } else {
          dbg('ERROR: no geometry found');
        }
      });
    });
  </script>
</body>
</html>
